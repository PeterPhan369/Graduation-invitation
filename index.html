<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đạo Phan - Graduation Invitation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --primary-color: #1a365d; /* Elegant deep blue */
            --accent-color: #d69e2e; /* Classy gold */
            --text-main: #2d3748;
            --text-light: #718096;
            --bg-color: #f7fafc;
        }

        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            color: var(--text-main); 
            background-color: var(--bg-color);
            overflow-x: hidden; 
        }

        /* Smooth sections */
        section { 
            min-height: 100vh; /* Changed to min-height so content doesn't get cut off on small screens */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 60px 20px; 
        }

        .hero-section {
            background: linear-gradient(135deg, #ffffff 0%, #edf2f7 100%);
            position: relative;
        }

        /* Typography */
        .invitation-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 4rem; 
            color: var(--primary-color);
            margin-bottom: 0; 
            line-height: 1.1;
        }
        .invitation-sub { 
            font-family: 'Playfair Display', serif;
            font-style: italic; 
            font-size: 1.8rem; 
            color: var(--accent-color);
            margin-top: 5px; 
        }
        
        /* --- ADDED Profile Picture Styles --- */
        .profile-pic-container {
            margin-top: 30px;
            position: relative;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Makes it circular */
            object-fit: cover; /* Ensures image isn't distorted */
            border: 4px solid #ffffff; /* White border frame */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Nice deep shadow */
            display: block; /* Helps centering */
        }
        /* --- END OF ADDED Styles --- */

        .greeting {
            margin-top: 30px; /* Reduced from 50px since pic is there now */
            padding: 30px 50px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .greeting p { font-size: 1.1rem; margin: 10px 0; }
        .greeting strong { color: var(--primary-color); font-size: 1.4rem; }

        /* Middle Section - Details & Map */
        .details-section {
            background-color: #ffffff;
        }

        .highlight { 
            font-weight: 600; 
            color: var(--primary-color);
            font-size: 1.5rem;
            border-bottom: 3px solid var(--accent-color); 
            padding-bottom: 10px; 
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Map Styling */
        .map-container { 
            width: 100%; 
            max-width: 800px; 
            height: 350px; 
            margin-top: 30px; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Slider Styling */
        .swiper-container {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative; 
        }
        .swiper-slide img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        /* Contact & Footer Section */
        .footer-section {
            background: var(--primary-color);
            color: white;
        }
        .footer-section .contact-info { 
            margin-top: 20px; 
            font-size: 1rem; 
            letter-spacing: 1px; 
            color: #e2e8f0;
        }
        .btn { 
            display: inline-block;
            margin-top: 30px; 
            padding: 15px 35px; 
            background: var(--accent-color); 
            color: #fff; 
            font-weight: 600;
            text-decoration: none; 
            border-radius: 30px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(214, 158, 46, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(214, 158, 46, 0.6);
            background: #b7791f;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div data-aos="fade-down" data-aos-duration="1200">
            <h1 class="invitation-title">Graduation</h1>
            <p class="invitation-sub">invitation.</p>
        </div>

        <div class="profile-pic-container" data-aos="zoom-in" data-aos-delay="200">
            <img src="daophan.jpg" alt="Đạo Phan Profile" class="profile-pic">
        </div>
        <div class="greeting" data-aos="zoom-in" data-aos-delay="400">
            <p>Thân mời: <strong id="guest-name">Bạn</strong></p>
            <p>đến dự buổi lễ tốt nghiệp của <br> <strong>Đạo Phan</strong></p>
        </div>
    </section>

    <section class="details-section">
        <div data-aos="fade-up">
            <h2 class="highlight">24 April, 2026 | 9H00</h2>
            <p style="font-size: 1.1rem; color: var(--text-light); font-weight: 600; line-height: 1.6;">
                Trường Đại học Bách Khoa - ĐHQG TP.HCM<br>
                <span style="font-size: 0.9rem; font-weight: 400;">(268 Lý Thường Kiệt, Phường 14, Quận 10, TP.HCM)</span>
            </p>
        </div>
        
        <div class="map-container" data-aos="fade-up" data-aos-delay="200">
            <iframe 
                src="https://maps.google.com/maps?q=Đại%20học%20Bách%20Khoa%20TPHCM&t=&z=16&ie=UTF8&iwloc=&output=embed" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <div class="swiper swiper-container" data-aos="fade-up" data-aos-delay="400">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="truong-dai-hoc-bach-khoa.jpg" alt="Đại học Bách Khoa TP.HCM">
                </div>
                <div class="swiper-slide">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Toa_nha_A4_DHBK_TPHCM.jpg/1024px-Toa_nha_A4_DHBK_TPHCM.jpg" alt="Tòa nhà A4 - Đại học Bách Khoa">
                </div>
                <div class="swiper-slide">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Thu_vien_DH_Bach_Khoa_TPHCM.jpg/1024px-Thu_vien_DH_Bach_Khoa_TPHCM.jpg" alt="Thư viện Đại học Bách Khoa">
                </div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev" style="color: var(--accent-color);"></div>
            <div class="swiper-button-next" style="color: var(--accent-color);"></div>
        </div>
    </section>

    <section class="footer-section">
        <div data-aos="zoom-in">
            <h3 style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px;">We hope to see you there!</h3>
            <p class="contact-info">FB: Peter Đạo  |  SĐT: 0968 979 839</p>
            <a href="https://www.facebook.com/PeterDao2003" target="_blank" class="btn">Confirm Attendance</a>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script>
        // Initialize AOS Animation
        AOS.init({
            once: true,
            offset: 100
        });
        
        // Initialize Swiper Carousel
        const swiper = new Swiper('.swiper-container', {
            loop: true,
            autoplay: {
                delay: 3500,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            effect: 'fade',
            fadeEffect: {
                crossFade: true
            }
        });

        // Personalize via URL (?name=Peter)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.getElementById('guest-name').innerText = decodeURIComponent(name);
        }
    </script>
</body>
</html>
