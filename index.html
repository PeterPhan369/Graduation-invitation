<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đạo Phan - Graduation Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --text-color: #333; --bg-color: #fff; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: var(--text-color); overflow-x: hidden; }
        section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        .invitation-title { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 0; }
        .invitation-sub { font-style: italic; font-size: 1.5rem; margin-top: -10px; }
        
        .highlight { font-weight: 600; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .map-container { width: 100%; max-width: 600px; height: 300px; margin-top: 20px; border: 1px solid #ddd; }
        
        .contact-info { margin-top: 50px; font-size: 0.9rem; letter-spacing: 1px; }
        .btn { margin-top: 20px; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <section>
        <div data-aos="fade-down" data-aos-duration="1000">
            <h1 class="invitation-title">Graduation</h1>
            <p class="invitation-sub">invitation.</p>
        </div>
        <div data-aos="zoom-in" data-aos-delay="500" style="margin-top: 40px;">
            <p>Thân mời: <strong id="guest-name">Bạn</strong></p>
            <p>đến dự buổi lễ tốt nghiệp của <strong>Đạo Phan</strong></p>
        </div>
    </section>

    <section style="background-color: #f9f9f9;">
        <div data-aos="fade-right">
            <h2 class="highlight">24 April, 2026 | 9h</h2>
            <p>Trường Đại học Bách Khoa - Đại học Quốc Gia TP.HCM</p>
        </div>
        
        <div class="map-container" data-aos="fade-up">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m23!1m12!1m3!1d125389.50405414576!2d106.70725722361024!3d10.855472791843344!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m8!3e6!4m0!4m5!1s0x31752ec3c161a3fb%3A0xef77cd47a1cc691e!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyBCw6FjaCBraG9hIC0gxJDhuqFpIGjhu41jIFF14buRYyBnaWEgVFAuSENNLCAyNjggxJAuIEzDvSBUaMaw4budbmcgS2nhu4d0LCBQaMaw4budbmcgMTQsIERpw6puIEjhu5NuZywgSOG7kyBDaMOtIE1pbmggNzAwMDAsIFZp4buHdCBOYW0!3m2!1d10.772075!2d106.65790179999999!5e0!3m2!1svi!2s!4v1776681428919!5m2!1svi!2s%22%20width=%22600%22%20height=%22450%22%20style=%22border:0;%22%20allowfullscreen=%22%22%20loading=%22lazy%22%20referrerpolicy=%22no-referrer-when-downgrade" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </section>

    <section>
        <div data-aos="flip-left">
            <p class="contact-info">FB: Peter Đạo | SĐT: 0968 979 839</p>
            <a href="https://www.facebook.com/PeterDao2003" class="btn">Confirm Attendance</a>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        // Simple Web Dev Trick: Personalize via URL (?name=Peter)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.getElementById('guest-name').innerText = name;
        }
    </script>
</body>
</html>
